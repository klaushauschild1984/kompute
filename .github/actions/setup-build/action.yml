name: 'Setup Build'
description: 'JDK 21 and Gradle setup shared across CI jobs. Run actions/checkout before this.'
runs:
    using: 'composite'
    steps:
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
              java-version: '21'
              distribution: 'temurin'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v4
