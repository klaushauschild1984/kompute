name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version (e.g. 0.2.0)'
                required: true
            next-version:
                description: 'Next development version (e.g. 0.3.0-SNAPSHOT)'
                required: true

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Install OpenGL dependencies
              run: sudo apt-get install -y xvfb libgl1-mesa-dev

            - name: Set release version
              run: |
                  sed -i 's/version = ".*-SNAPSHOT"/version = "${{ inputs.version }}"/' build.gradle.kts
                  sed -i 's/:kompute-opengl:v[0-9.]*/:kompute-opengl:v${{ inputs.version }}/' README.md
                  sed -i 's|<version>v[0-9.]*</version>|<version>v${{ inputs.version }}</version>|' README.md

            - name: Build and test
              run: xvfb-run ./gradlew build
              env:
                  LIBGL_ALWAYS_SOFTWARE: "1"

            - name: Commit and tag release
              run: |
                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"
                  git add build.gradle.kts README.md
                  git commit -m "Release v${{ inputs.version }}"
                  git tag "v${{ inputs.version }}"

            - name: Set next development version
              run: sed -i 's/version = "${{ inputs.version }}"/version = "${{ inputs.next-version }}"/' build.gradle.kts

            - name: Commit next development version
              run: |
                  git add build.gradle.kts
                  git commit -m "Prepare next development version ${{ inputs.next-version }}"

            - name: Push
              run: git push origin main --tags
