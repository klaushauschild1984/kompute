name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version (e.g. 0.2.0)'
                required: true
            next-version:
                description: 'Next development version (e.g. 0.3.0-SNAPSHOT)'
                required: true

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Install OpenGL dependencies
              run: sudo apt-get install -y xvfb libgl1-mesa-dev

            - name: Set release version
              run: |
                  sed -i 's/version = ".*-SNAPSHOT"/version = "${{ inputs.version }}"/' build.gradle.kts
                  VERSION="${{ inputs.version }}"
                  DATE=$(date +%Y-%m-%d)
                  PREV=$(grep -m1 '^\[v' CHANGELOG.md | sed 's/\[\(v[0-9.]*\)\].*/\1/')
                  sed -i "0,/^## \[v/s/^## \[v/## [v${VERSION}] — ${DATE}\n\n### Added\n\n### Changed\n\n### Deprecated\n\n### Removed\n\n### Fixed\n\n### Security\n\n## [v/" CHANGELOG.md
                  sed -i "0,/^\[v/s/^\[v/[v${VERSION}]: https:\/\/github.com\/klaushauschild1984\/kompute\/compare\/${PREV}...v${VERSION}\n[v/" CHANGELOG.md

            - name: Build and test
              run: xvfb-run ./gradlew build
              env:
                  LIBGL_ALWAYS_SOFTWARE: "1"

            - name: Commit and tag release
              run: |
                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"
                  git add build.gradle.kts CHANGELOG.md
                  git commit -m "Release v${{ inputs.version }}"
                  git tag "v${{ inputs.version }}"

            - name: Set next development version
              run: sed -i 's/version = "${{ inputs.version }}"/version = "${{ inputs.next-version }}"/' build.gradle.kts

            - name: Commit next development version
              run: |
                  git add build.gradle.kts
                  git commit -m "Prepare next development version ${{ inputs.next-version }}"

            - name: Push
              run: git push origin main --tags
