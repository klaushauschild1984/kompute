name: Release

on:
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Install OpenGL dependencies
              run: sudo apt-get install -y xvfb libgl1-mesa-dev

            - name: Validate changelog and determine version
              id: version
              run: python3 .github/scripts/release.py validate

            - name: Finalize changelog and set release version
              run: python3 .github/scripts/release.py finalize

            - name: Build and test
              run: xvfb-run ./gradlew build
              env:
                  LIBGL_ALWAYS_SOFTWARE: "1"

            - name: Commit release and tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git commit -am "Release ${VERSION}"
                  .github/scripts/git-push-retry.sh "${VERSION}"
              env:
                  VERSION: ${{ steps.version.outputs.version }}

            - name: Create GitHub release
              run: |
                  python3 .github/scripts/release.py notes > release-notes.md
                  gh release create "${VERSION}" --title "${VERSION}" --notes-file release-notes.md
              env:
                  VERSION: ${{ steps.version.outputs.version }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Prepare next development cycle
              run: |
                  python3 .github/scripts/release.py prepare
                  git commit -am "Prepare next development cycle [skip ci]"
                  .github/scripts/git-push-retry.sh
