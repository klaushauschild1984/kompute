name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            checks: write
            contents: write
            security-events: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Install OpenGL dependencies
              run: sudo apt-get install -y xvfb libgl1-mesa-dev

            - name: Run checks
              run: xvfb-run ./gradlew check
              env:
                  LIBGL_ALWAYS_SOFTWARE: "1"

            -   name: Upload Detekt results (core)
                uses: github/codeql-action/upload-sarif@v4
                if: always() && hashFiles('kompute-core/build/reports/detekt/detekt.sarif') != ''
                with:
                    sarif_file: kompute-core/build/reports/detekt/detekt.sarif
                    category: detekt-core

            -   name: Upload Detekt results (opengl)
                uses: github/codeql-action/upload-sarif@v4
                if: always() && hashFiles('kompute-opengl/build/reports/detekt/detekt.sarif') != ''
                with:
                    sarif_file: kompute-opengl/build/reports/detekt/detekt.sarif
                    category: detekt-opengl

            -   name: Upload Diktat results (core)
                uses: github/codeql-action/upload-sarif@v4
                if: always() && hashFiles('kompute-core/build/reports/diktat/diktat.sarif') != ''
                with:
                    sarif_file: kompute-core/build/reports/diktat/diktat.sarif
                    category: diktat-core

            -   name: Upload Diktat results (opengl)
                uses: github/codeql-action/upload-sarif@v4
                if: always() && hashFiles('kompute-opengl/build/reports/diktat/diktat.sarif') != ''
                with:
                    sarif_file: kompute-opengl/build/reports/diktat/diktat.sarif
                    category: diktat-opengl

            -   name: Test Report
                uses: dorny/test-reporter@v1
                if: always()
                with:
                    name: Tests
                    path: '**/build/test-results/test/*.xml'
                    reporter: java-junit

            -   name: Generate Coverage Badge (core)
                uses: cicirello/jacoco-badge-generator@v2
                with:
                    jacoco-csv-file: build/reports/jacoco/jacocoCoreReport/jacocoCoreReport.csv
                    coverage-badge-filename: jacoco-core.svg

            -   name: Generate Coverage Badge (opengl)
                uses: cicirello/jacoco-badge-generator@v2
                with:
                    jacoco-csv-file: kompute-opengl/build/reports/jacoco/test/jacocoTestReport.csv
                    coverage-badge-filename: jacoco-opengl.svg

            -   name: Commit Badges
                uses: stefanzweifel/git-auto-commit-action@v5
                with:
                    commit_message: "Update coverage badges"
                    file_pattern: ".github/badges/*.svg"
