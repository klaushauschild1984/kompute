name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

permissions:
    checks: write
    contents: write
    security-events: write

jobs:
    core:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Run checks
              run: ./gradlew :kompute-core:check :kompute-coroutines:check :kompute-serialization:check :kompute-serialization:processor:check :kompute-serialization:test:check

            - name: Upload Detekt results (core)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-core/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-core/build/reports/detekt/detekt.sarif
                  category: detekt-core

            - name: Upload Diktat results (core)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-core/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-core/build/reports/diktat/diktat.sarif
                  category: diktat-core

            - name: Upload Detekt results (coroutines)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-coroutines/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-coroutines/build/reports/detekt/detekt.sarif
                  category: detekt-coroutines

            - name: Upload Diktat results (coroutines)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-coroutines/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-coroutines/build/reports/diktat/diktat.sarif
                  category: diktat-coroutines

            - name: Test Report (core)
              uses: dorny/test-reporter@v1
              if: always()
              with:
                  name: Tests (core)
                  path: kompute-core/build/test-results/test/*.xml
                  reporter: java-junit

            - name: Test Report (coroutines)
              uses: dorny/test-reporter@v1
              if: always()
              with:
                  name: Tests (coroutines)
                  path: kompute-coroutines/build/test-results/test/*.xml
                  reporter: java-junit

            - name: Upload Detekt results (serialization)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-serialization/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-serialization/build/reports/detekt/detekt.sarif
                  category: detekt-serialization

            - name: Upload Diktat results (serialization)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-serialization/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-serialization/build/reports/diktat/diktat.sarif
                  category: diktat-serialization

            - name: Upload Detekt results (serialization:processor)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-serialization/processor/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-serialization/processor/build/reports/detekt/detekt.sarif
                  category: detekt-serialization-processor

            - name: Upload Diktat results (serialization:processor)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-serialization/processor/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-serialization/processor/build/reports/diktat/diktat.sarif
                  category: diktat-serialization-processor

            - name: Upload Detekt results (serialization:test)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-serialization/test/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-serialization/test/build/reports/detekt/detekt.sarif
                  category: detekt-serialization-test

            - name: Upload Diktat results (serialization:test)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-serialization/test/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-serialization/test/build/reports/diktat/diktat.sarif
                  category: diktat-serialization-test

            - name: Test Report (serialization)
              uses: dorny/test-reporter@v1
              if: always()
              with:
                  name: Tests (serialization)
                  path: kompute-serialization/test/build/test-results/test/*.xml
                  reporter: java-junit

            - name: Generate Coverage Badge (core)
              uses: cicirello/jacoco-badge-generator@v2
              with:
                  jacoco-csv-file: kompute-core/build/reports/jacoco/test/jacocoTestReport.csv
                  coverage-badge-filename: jacoco-core.svg

            - name: Commit Badge (core)
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "Update core coverage badge"
                  file_pattern: .github/badges/jacoco-core.svg


    opengl:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest ]
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-build

            - name: Install OpenGL dependencies (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get install -y xvfb libgl1-mesa-dev

            - name: Install Mesa (Windows)
              if: runner.os == 'Windows'
              shell: powershell
              run: |
                  $version = "24.2.3"
                  $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$version/mesa3d-$version-release-msvc.7z"
                  Invoke-WebRequest -Uri $url -OutFile mesa.7z
                  7z x mesa.7z -omesa
                  Add-Content $env:GITHUB_PATH "${{ github.workspace }}\mesa\x64"

            - name: Run checks (Linux)
              if: runner.os == 'Linux'
              run: xvfb-run ./gradlew :kompute-opengl:check
              env:
                  LIBGL_ALWAYS_SOFTWARE: "1"

            - name: Run checks (Windows)
              if: runner.os == 'Windows'
              env:
                  JAVA_TOOL_OPTIONS: "-Dkompute.backend.egl=true"
              run: ./gradlew :kompute-opengl:check

            - name: Upload backend reports
              if: always()
              uses: ./.github/actions/upload-backend-reports
              with:
                  module: kompute-opengl
                  backend: opengl
                  os: ${{ matrix.os }}

    vulkan:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macos-latest ]
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup-build

            - name: Install Vulkan dependencies (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get install -y mesa-vulkan-drivers libvulkan1

            - name: Install Mesa (Windows)
              if: runner.os == 'Windows'
              shell: powershell
              run: |
                  $version = "24.2.3"
                  $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$version/mesa3d-$version-release-msvc.7z"
                  Invoke-WebRequest -Uri $url -OutFile mesa.7z
                  7z x mesa.7z -omesa
                  Add-Content $env:GITHUB_PATH "${{ github.workspace }}\mesa\x64"
                  # PATH alone doesn't register a Vulkan ICD. The loader's primary Windows discovery
                  # mechanism is the registry, not an environment variable - this is also what
                  # Microsoft's DirectXShaderCompiler CI does for the same Mesa package.
                  $lvpIcd = (Get-ChildItem "${{ github.workspace }}\mesa" -Recurse -Filter "lvp_icd.x86_64.json" | Select-Object -First 1).FullName
                  reg add "HKLM\SOFTWARE\Khronos\Vulkan\Drivers" /v "$lvpIcd" /t REG_DWORD /d 0 /f /reg:64

            - name: Run checks
              run: ./gradlew :kompute-vulkan:check

            - name: Upload backend reports
              if: always()
              uses: ./.github/actions/upload-backend-reports
              with:
                  module: kompute-vulkan
                  backend: vulkan
                  os: ${{ matrix.os }}

    other:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Install OpenGL dependencies
              run: sudo apt-get install -y xvfb libgl1-mesa-dev

            - name: Run checks
              run: xvfb-run ./gradlew :kompute-benchmark:check :kompute-showcase:check
              env:
                  LIBGL_ALWAYS_SOFTWARE: "1"

            - name: Upload Detekt results (benchmark)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-benchmark/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-benchmark/build/reports/detekt/detekt.sarif
                  category: detekt-benchmark

            - name: Upload Diktat results (benchmark)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-benchmark/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-benchmark/build/reports/diktat/diktat.sarif
                  category: diktat-benchmark

            - name: Upload Detekt results (showcase)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-showcase/build/reports/detekt/detekt.sarif') != ''
              with:
                  sarif_file: kompute-showcase/build/reports/detekt/detekt.sarif
                  category: detekt-showcase

            - name: Upload Diktat results (showcase)
              uses: github/codeql-action/upload-sarif@v4
              if: always() && hashFiles('kompute-showcase/build/reports/diktat/diktat.sarif') != ''
              with:
                  sarif_file: kompute-showcase/build/reports/diktat/diktat.sarif
                  category: diktat-showcase

            - name: Test Report
              uses: dorny/test-reporter@v1
              if: always()
              with:
                  name: Tests (other)
                  path: '**/build/test-results/test/*.xml'
                  reporter: java-junit
